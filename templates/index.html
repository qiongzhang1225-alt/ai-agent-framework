  <script>
    // 配置 marked
    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
        }
        try { return hljs.highlightAuto(code).value; } catch (e) {}
        return code;
      },
    });

    const MODELS = {{ models|tojson }};
    const DEFAULT_MODEL = {{ default_model|tojson }};

    // renderMarkdown 缓存：text → 渲染好的 sanitized HTML
    // 切大对话（200+ 消息）时不重跑 marked + hljs + DOMPurify，从 ~3 秒降到 ~50ms
    // 用 Map 维护插入序作 LRU，超过上限淘汰最旧（流式消息每 tick 改变 text，会
    // 持续产生新 key，所以需要淘汰避免内存膨胀）
    const _MD_CACHE = new Map();
    const _MD_CACHE_MAX = 1000;
    function _renderMarkdownCached(text) {
      if (!text) return '';
      const hit = _MD_CACHE.get(text);
      if (hit !== undefined) {
        // LRU: 访问后挪到末尾（Map 按插入序遍历，删了再 set 等于挪后）
        _MD_CACHE.delete(text);
        _MD_CACHE.set(text, hit);
        return hit;
      }
      let html = marked.parse(text);
      html = html.replace(
        /<pre><code/g,
        '<pre><button class="code-copy-btn" type="button" onclick="window.__yukiCopyCode(this)">⧉ 复制</button><code'
      );
      const sanitized = DOMPurify.sanitize(html, {
        ADD_ATTR: ['target', 'onclick', 'type'],
        ADD_TAGS: ['button'],
      });
      if (_MD_CACHE.size >= _MD_CACHE_MAX) {
        // 淘汰最旧（Map 的第一个 key）
        const firstKey = _MD_CACHE.keys().next().value;
        _MD_CACHE.delete(firstKey);
      }
      _MD_CACHE.set(text, sanitized);
      return sanitized;
    }

    function chatApp() {
      return {
        // ── 状态 ──
        conversations: [],
        newConvMenuOpen: false,            // 新对话三选下拉
        bucketCollapseState: {},           // 时间桶折叠记忆（per label）
        currentId: null,
        currentConv: null,
        messages: [],
        input: '',
        streaming: false,
        abortController: null,   // 停止生成时 abort fetch
        toolStatus: '',
        models: MODELS,
        currentModel: DEFAULT_MODEL,
        sidebarCollapsed: false,
        modelDropdownOpen: false,
        showWorkdirEditor: false,    // legacy，已迁移到 header 浮卡 workdirCardOpen
        workdirCardOpen: false,      // header 右上角"工作目录"浮卡
        workdirInput: '',
        editingIdx: -1,
        editingText: '',
        pendingFiles: [],
        pendingImages: [],   // base64 data URL 列表（多模态，D3）
        dragHover: false,
        // Todo 浮卡（D1）
        todoCardOpen: false,
        todos: [],            // [{content, status}], thread 级
        // 主动追问弹窗（D2 ask_user）
        askPrompt: null,      // {id, question, options, groups} 或 null
        askCustomInput: '',
        askGroupAnswers: {},  // 分组模式：{group.label: 选中的 choice}
        // 主题：仅用于按钮显示，实际状态由全局 _yukiTheme 管理
        theme: 'dark',
        // 已压缩历史折叠卡：哪些展开了 + 拉到的全文缓存
        compressedExpanded: {},
        compressedFullText: {},
        // 工具步骤卡：哪些展开了详情
        expandedSteps: {},
        // 文件树（取代旧的 recentFiles 平铺）
        fileTree: [],
        expandedDirs: {},   // 目录路径 → 是否展开
        // 记忆库
        memoryModalOpen: false,
        memories: [],
        memoryCount: 0,
        memoryQuery: '',
        newMemoryInput: '',
        newMemoryCategory: 'other',
        newMemoryImportance: 5,
        memoryCategoryFilter: 'all',
        categoryFilterOptions: [
          { value: 'all', label: '全部' },
          { value: 'user_profile', label: '用户画像' },
          { value: 'agent_directive', label: '有希行为' },
          { value: 'other', label: '其他' },
        ],
        editingMemoryId: null,
        editMemoryText: '',
        editMemoryCategory: 'other',
        editMemoryImportance: 5,
        // 最近文件 + @mention 补全
        recentFiles: [],
        mentionOpen: false,
        mentionFiles: [],
        mentionIdx: 0,
        // 实时终端输出面板（D3：run_command_stream）
        terminalOpen: false,        // 面板是否显示
        terminalLines: [],          // [{tag, text}]
        terminalTaskId: '',         // 当前命令的 task_id（取消用）
        terminalDone: false,        // 命令是否已完成
        // 后台任务面板（D3：TaskManager）
        taskCardOpen: false,        // 后台任务浮卡是否显示
        tasks: [],                  // 任务列表（来自 /api/tasks）
        taskDetail: null,           // 当前展开查看的任务详情
        taskDetailLoading: false,   // 详情加载中
        // docx 预览缓存（{path: text}）
        docxCache: {},
        docxOpen: {},

        // ── 初始化 ──
        async init() {
          await this.loadConversations();
          if (this.conversations.length === 0) {
            await this.newConversation();
          } else {
            await this.selectConversation(this.conversations[0].id);
          }
          this.bindShortcuts();
          // 拉取记忆数量（用于 sidebar 显示）
          this.refreshMemoryCount();
          // 拉取当前会话的最近文件
          this.loadRecentFiles();
          // 同步主题状态（IIFE 已应用 class，这里只读）
          this.theme = window._yukiTheme ? window._yukiTheme.get() : 'dark';
        },

        // ── 主题切换 ──
        toggleTheme() {
          if (window._yukiTheme) this.theme = window._yukiTheme.toggle();
        },

        // ── 已压缩历史折叠卡：点击展开/收起，第一次展开时拉全文 ──
        async toggleCompressedEntry(i) {
          this.compressedExpanded[i] = !this.compressedExpanded[i];
          if (!this.compressedExpanded[i]) return;
          if (this.compressedFullText[i]) return;  // 已缓存
          const entry = this.currentConv?.compressed_summaries?.[i];
          if (!entry?.memory_id) return;
          try {
            const r = await fetch(`/api/memory/${entry.memory_id}`);
            if (r.ok) {
              const data = await r.json();
              this.compressedFullText[i] = data.text || entry.summary_preview || '';
            }
          } catch (e) {
            // 记忆库异常 → 退回 preview，UI 已用 || entry.summary_preview 兜底
          }
        },

        // ── 记忆库 ──
        async refreshMemoryCount() {
          try {
            const resp = await fetch('/api/memory');
            if (!resp.ok) return;
            const data = await resp.json();
            this.memoryCount = data.length;
          } catch (e) {
            // 记忆库 API 不可用时静默失败，不影响主流程
          }
        },

        async openMemoryModal() {
          this.memoryModalOpen = true;
          await this.loadMemories();
        },

        closeMemoryModal() {
          this.memoryModalOpen = false;
          this.newMemoryInput = '';
          this.newMemoryCategory = 'other';
          this.newMemoryImportance = 5;
          this.memoryQuery = '';
          this.memoryCategoryFilter = 'all';
          this.editingMemoryId = null;
        },

        async loadMemories() {
          try {
            const resp = await fetch('/api/memory');
            if (!resp.ok) throw new Error(resp.statusText);
            this.memories = await resp.json();
            this.memoryCount = this.memories.length;
          } catch (e) {
            alert('加载记忆失败：' + e.message);
          }
        },

        filteredMemories() {
          const q = this.memoryQuery.trim().toLowerCase();
          const cat = this.memoryCategoryFilter;
          return this.memories.filter(m => {
            if (cat !== 'all' && (m.category || 'other') !== cat) return false;
            if (q && !m.text.toLowerCase().includes(q)) return false;
            return true;
          });
        },

        categoryLabel(cat) {
          const map = {
            user_profile: '用户画像',
            agent_directive: '有希行为',
            other: '其他',
          };
          return map[cat || 'other'] || '其他';
        },

        categoryBadgeClass(cat) {
          const map = {
            user_profile: 'border-blue-400/40 text-blue-300 bg-blue-500/10',
            agent_directive: 'border-purple-400/40 text-purple-300 bg-purple-500/10',
            other: 'border-zinc-500/40 text-zinc-400 bg-zinc-500/10',
          };
          return map[cat || 'other'] || map.other;
        },

        importanceStars(n) {
          const v = Math.max(1, Math.min(10, parseInt(n) || 5));
          // 满 5 个星：满星 = ★，半星 = ⯨，空星 = ☆。这里简单按 v/2 折算成 0-5 颗。
          const full = Math.floor(v / 2);
          const half = (v % 2 === 1) ? 1 : 0;
          const empty = 5 - full - half;
          return '★'.repeat(full) + (half ? '⯨' : '') + '☆'.repeat(empty) + ` ${v}/10`;
        },

        async addMemoryManual() {
          const fact = this.newMemoryInput.trim();
          if (!fact) return;
          try {
            const resp = await fetch('/api/memory', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                fact,
                category: this.newMemoryCategory,
                importance: this.newMemoryImportance,
              }),
            });
            if (!resp.ok) {
              const err = await resp.json().catch(() => ({}));
              throw new Error(err.detail || resp.statusText);
            }
            this.newMemoryInput = '';
            // 分类和权重保留，方便连续录入同类型
            await this.loadMemories();
          } catch (e) {
            alert('添加失败：' + e.message);
          }
        },

        beginEditMemory(m) {
          this.editingMemoryId = m.id;
          this.editMemoryText = m.text;
          this.editMemoryCategory = m.category || 'other';
          this.editMemoryImportance = m.importance || 5;
        },

        cancelEditMemory() {
          this.editingMemoryId = null;
          this.editMemoryText = '';
        },

        async saveEditMemory(id) {
          const text = this.editMemoryText.trim();
          if (!text) {
            alert('记忆内容不能为空');
            return;
          }
          try {
            const resp = await fetch(`/api/memory/${id}`, {
              method: 'PATCH',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                text,
                category: this.editMemoryCategory,
                importance: this.editMemoryImportance,
              }),
            });
            if (!resp.ok) {
              const err = await resp.json().catch(() => ({}));
              throw new Error(err.detail || resp.statusText);
            }
            this.editingMemoryId = null;
            await this.loadMemories();
          } catch (e) {
            alert('保存失败：' + e.message);
          }
        },

        async deleteMemoryItem(id) {
          if (!confirm('删除这条记忆？')) return;
          try {
            await fetch(`/api/memory/${id}`, { method: 'DELETE' });
            await this.loadMemories();
          } catch (e) {
            alert('删除失败：' + e.message);
          }
        },

        bindShortcuts() {
          // 全局键盘快捷键
          document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'n') {
              e.preventDefault();
              this.newConversation();
            } else if (e.ctrlKey && e.key === 'b') {
              e.preventDefault();
              this.sidebarCollapsed = !this.sidebarCollapsed;
            } else if (e.ctrlKey && e.key === 's') {
              e.preventDefault();
              this.exportConversation();
            }
          });

          // 全局点击 delegation：消息里 [→ name](#sub=id) 形式的链接跳转到对应子对话
          document.addEventListener('click', (e) => {
            const a = e.target.closest('a[href^="#sub="]');
            if (a) {
              e.preventDefault();
              const href = a.getAttribute('href') || '';
              const subId = href.slice(5); // 去掉 '#sub='
              if (subId) this.selectConversation(subId);
            }
          });

          // 全局拖拽：在窗口任何位置拖文件都能上传
          let dragHideTimer = null;
          window.addEventListener('dragover', (e) => {
            if (e.dataTransfer?.types?.includes('Files')) {
              e.preventDefault();
              this.dragHover = true;
              clearTimeout(dragHideTimer);
              // dragover 持续触发会 reset timer；拖着不动时保持 hover
              dragHideTimer = setTimeout(() => this.dragHover = false, 120);
            }
          });
          window.addEventListener('drop', (e) => {
            e.preventDefault();
            clearTimeout(dragHideTimer);
            this.dragHover = false;
            const fl = e.dataTransfer?.files;
            if (!fl || !fl.length) return;
            // 图片走"贴图给有希看"路径（vision_describe），其他走"上传到工作目录"路径
            const images = [];
            const others = [];
            for (const f of fl) {
              if (f.type && f.type.startsWith('image/')) images.push(f);
              else others.push(f);
            }
            if (images.length) this.addImages(images);
            if (others.length) this.addFiles(others);
          });
        },

        // textarea 按键处理（兼容输入法 IME composing + @mention 补全键盘导航）
        onKeyDown(e) {
          // @mention 补全打开时，键盘优先用于导航 dropdown
          if (this.mentionOpen) {
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              this.mentionIdx = Math.min(this.mentionIdx + 1, this.mentionFiles.length - 1);
              return;
            }
            if (e.key === 'ArrowUp') {
              e.preventDefault();
              this.mentionIdx = Math.max(this.mentionIdx - 1, 0);
              return;
            }
            if (e.key === 'Enter' || e.key === 'Tab') {
              if (this.mentionFiles[this.mentionIdx]) {
                e.preventDefault();
                this.selectMention(this.mentionFiles[this.mentionIdx]);
                return;
              }
            }
            if (e.key === 'Escape') {
              e.preventDefault();
              this.mentionOpen = false;
              return;
            }
          }

          if (e.key !== 'Enter') return;
          // 输入法正在 compose（如打中文）时按 Enter 是"确认输入法"，不发消息
          if (e.isComposing || e.keyCode === 229) return;
          // Shift+Enter：让 textarea 默认换行
          if (e.shiftKey) return;
          // 单纯 Enter：发送
          e.preventDefault();
          this.sendMessage();
        },

        // ── 会话 ──
        async loadConversations() {
          const resp = await fetch('/api/conversations');
          this.conversations = await resp.json();
        },

        // ── M+：主对话 / 时间抽屉分组 ──
        get masterConv() {
          return this.conversations.find(c => c.kind === 'master') || null;
        },

        get hasMaster() {
          return !!this.masterConv;
        },

        // 计算时间分组（一天前 / 三天前 / 五天前 / 十五天前 / 更早）
        get convBuckets() {
          const now = Date.now();
          const H = 3600 * 1000;
          const buckets = [
            { label: '一天前',   maxAgeH: 24,   items: [] },
            { label: '三天前',   maxAgeH: 72,   items: [] },
            { label: '五天前',   maxAgeH: 120,  items: [] },
            { label: '十五天前', maxAgeH: 360,  items: [] },
            { label: '更早',     maxAgeH: null, items: [] },
          ];
          for (const c of this.conversations) {
            if (c.kind === 'master') continue;  // 主对话在外面单独显示
            // last_message_ts 是后端兜底过的（消息没 ts 时用 conv.json mtime）
            // 永远 > 0 除非 conv 文件出问题
            let lastTs = 0;
            if (c.last_message_ts) {
              try { lastTs = new Date(c.last_message_ts).getTime(); } catch (e) {}
            }
            const ageH = lastTs > 0 ? (now - lastTs) / H : Number.POSITIVE_INFINITY;
            for (const b of buckets) {
              if (b.maxAgeH === null || ageH <= b.maxAgeH) {
                b.items.push(c);
                break;
              }
            }
          }
          // 每桶按最近时间倒序
          for (const b of buckets) {
            b.items.sort((a, c) => (c.last_message_ts || '').localeCompare(a.last_message_ts || ''));
            // 折叠状态（默认前两桶展开）
            b.collapsed = this.bucketCollapseState[b.label]
              ?? (b.label !== '一天前' && b.label !== '三天前');
          }
          return buckets;
        },

        convTypeIcon(conv) {
          if (conv.kind === 'sub' && conv.sub_level === 'advanced') return '🛡️';
          if (conv.kind === 'sub' && conv.sub_level === 'restricted') return '🔒';
          return '💬';
        },

        convTooltip(conv) {
          const parts = [];
          if (conv.kind === 'sub') {
            parts.push(`子对话（${conv.sub_level === 'advanced' ? '高级' : '受限'}）`);
          } else if (conv.kind === 'master') {
            parts.push('主对话');
          } else {
            parts.push('独立对话');
          }
          if (conv.summary_pending_approval) parts.push('待批准摘要');
          if (conv.summary_approved_for_master) parts.push('✓ 已纳入主对话');
          return parts.join(' · ');
        },

        async selectConversation(id) {
          // 离开旧 sub 时触发后台摘要（不阻塞）
          if (this.currentConv && this.currentConv.id !== id
              && this.currentConv.kind === 'sub'
              && (this.currentConv.messages || []).length >= 2) {
            const oldId = this.currentConv.id;
            fetch(`/api/conversations/${oldId}/summarize`, { method: 'POST' })
              .then(r => r.json())
              .then(data => {
                if (data.ok) {
                  // 摘要好了 → 重新加载列表让"待批准"徽章出现
                  this.loadConversations();
                }
              })
              .catch(() => {});
          }
          this.currentId = id;
          const resp = await fetch(`/api/conversations/${id}`);
          if (!resp.ok) { await this.loadConversations(); return; }
          const conv = await resp.json();
          this.currentConv = conv;
          const incomingMsgs = conv.messages || [];

          // 预热 markdown 缓存：在 messages 赋值前同步编译一遍。
          // 大对话（200+ 消息）切换时，Alpine 后续 x-html 求值全是 O(1) 缓存命中，
          // 避免一波 marked+hljs+DOMPurify 串行渲染撞主线程产生几秒卡顿。
          for (const m of incomingMsgs) {
            const t = this.stripImageRef(this.msgText(m));
            if (t) _renderMarkdownCached(t);
          }

          this.messages = incomingMsgs;
          this.currentModel = conv.model;
          this.workdirInput = conv.workdir;
          this.editingIdx = -1;
          this.docxOpen = {};
          this.todoCardOpen = false;
          this.workdirCardOpen = false;
          // 切对话重置压缩折叠卡的展开状态 + 全文缓存
          this.compressedExpanded = {};
          this.compressedFullText = {};
          // 切对话重置工具步骤卡展开状态
          this.expandedSteps = {};
          // 切对话重置文件树状态（避免显示旧 conv 的目录展开状态）
          this.fileTree = [];
          this.expandedDirs = {};

          // ── streaming 恢复：如果切到的 conv 在后台 streaming，把 buffer 接回 view ──
          const sentConv = this.conversations.find(c => c.id === id);
          if (sentConv?._isStreaming) {
            const um = { role: 'user', content: sentConv._streamUserMsg || '' };
            if (sentConv._streamUserImages?.length) um._localImages = sentConv._streamUserImages;
            this.messages.push(um);
            this.messages.push({
              role: 'assistant',
              content: sentConv._streamBuf || '',
              files: sentConv._streamFiles || [],
              streaming: true,
            });
            this.streaming = true;
            this.toolStatus = sentConv._streamToolStatus || '';
          } else {
            this.streaming = false;
            this.toolStatus = '';
          }

          this.loadRecentFiles();
          this.loadTodos();
          this.scrollToBottom();
        },

        async loadTodos() {
          if (!this.currentId) return;
          try {
            const r = await fetch(`/api/conversations/${this.currentId}/todos`);
            if (!r.ok) return;
            const data = await r.json();
            this.todos = data.items || [];
          } catch (e) {
            // 静默失败
          }
        },

        async answerAsk(answer) {
          // 用户回应有希的追问。POST 回 server 让工具继续。
          if (!this.askPrompt) return;
          const askId = this.askPrompt.id;
          const a = String(answer || '').trim();
          if (!a) return;
          // 先关弹窗给用户即时反馈
          this.askPrompt = null;
          this.askCustomInput = '';
          this.askGroupAnswers = {};
          try {
            const r = await fetch(`/api/ask_user/${askId}`, {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ answer: a }),
            });
            if (!r.ok) {
              // 410：弹窗已超时
              const detail = await r.json().catch(() => ({}));
              alert('回答失败：' + (detail.detail || r.statusText));
            }
          } catch (e) {
            alert('回答失败：' + e.message);
          }
        },

        // ── 分组模式：每组都选了才允许提交，提交时聚合多行答案 ──
        isAllGroupsAnswered() {
          const gs = this.askPrompt?.groups || [];
          if (!gs.length) return false;
          return gs.every(g => !!this.askGroupAnswers[g.label]);
        },
        submitGroupedAnswer() {
          if (!this.isAllGroupsAnswered()) return;
          const gs = this.askPrompt.groups || [];
          // 多行字符串：- TTS 引擎: Edge TTS
          const aggregated = gs
            .map(g => `- ${g.label}: ${this.askGroupAnswers[g.label]}`)
            .join('\n');
          this.answerAsk(aggregated);
        },

        // ── M+：子对话权限切换 + 摘要操作 ──
        async toggleSubLevel() {
          if (!this.currentConv || this.currentConv.kind !== 'sub') return;
          const next = this.currentConv.sub_level === 'advanced' ? 'restricted' : 'advanced';
          const r = await fetch(`/api/conversations/${this.currentConv.id}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sub_level: next }),
          });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            alert('切换失败：' + (err.detail || r.statusText));
            return;
          }
          const updated = await r.json();
          this.currentConv.sub_level = updated.sub_level;
          // 同步 conversations 列表里那一条
          const idx = this.conversations.findIndex(c => c.id === this.currentConv.id);
          if (idx >= 0) this.conversations[idx].sub_level = updated.sub_level;
        },

        async manualSummarize() {
          if (!this.currentConv || this.currentConv.kind !== 'sub') return;
          if ((this.currentConv.messages || []).length < 2) {
            alert('对话内容太少，无法汇总');
            return;
          }
          const r = await fetch(`/api/conversations/${this.currentConv.id}/summarize`, { method: 'POST' });
          const data = await r.json();
          if (!data.ok) {
            alert('汇总失败：' + (data.reason || '未知原因'));
            return;
          }
          this.currentConv.summary = data.summary;
          this.currentConv.summary_updated_at = data.summary_updated_at;
          this.currentConv.summary_pending_approval = true;
          this.currentConv.summary_approved_for_master = false;
          await this.loadConversations();
          alert('摘要已生成：\n\n' + data.summary + '\n\n在 header 上点"批准纳入主"让有希看到。');
        },

        async approveSummary(approve) {
          if (!this.currentConv || this.currentConv.kind !== 'sub') return;
          const r = await fetch(`/api/conversations/${this.currentConv.id}/summary`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ approved: approve }),
          });
          if (!r.ok) {
            alert('操作失败');
            return;
          }
          const data = await r.json();
          this.currentConv.summary_approved_for_master = data.summary_approved_for_master;
          this.currentConv.summary_pending_approval = false;
          await this.loadConversations();
        },

        async newConversation(kind = 'standalone', subLevel = null) {
          const body = { model: this.currentModel, kind };
          if (kind === 'sub') {
            const master = this.masterConv;
            if (!master) {
              alert('找不到主对话"有希"，无法创建子对话');
              return;
            }
            body.parent_id = master.id;
            body.sub_level = subLevel || 'restricted';
          }
          const resp = await fetch('/api/conversations', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            alert('新建失败：' + (err.detail || resp.statusText));
            return;
          }
          const conv = await resp.json();
          await this.loadConversations();
          await this.selectConversation(conv.id);
          this.$nextTick(() => this.$refs.inputEl?.focus());
        },

        async deleteConversation(id) {
          if (!confirm('确认删除此对话？')) return;
          await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
          await this.loadConversations();
          if (id === this.currentId) {
            if (this.conversations.length) {
              await this.selectConversation(this.conversations[0].id);
            } else {
              await this.newConversation();
            }
          }
        },

        async startRename(conv) {
          if (!conv) return;
          const newName = prompt('重命名对话：', conv.name);
          if (newName && newName.trim() && newName !== conv.name) {
            await fetch(`/api/conversations/${conv.id}`, {
              method: 'PATCH',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ name: newName.trim() }),
            });
            await this.loadConversations();
            if (conv.id === this.currentId) {
              this.currentConv.name = newName.trim();
            }
          }
        },

        async updateModel() {
          if (!this.currentId) return;
          await fetch(`/api/conversations/${this.currentId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ model: this.currentModel }),
          });
          this.currentConv.model = this.currentModel;
        },

        async applyWorkdir() {
          const newWd = this.workdirInput.trim();
          if (!newWd) return;
          try {
            const resp = await fetch(`/api/conversations/${this.currentId}`, {
              method: 'PATCH',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ workdir: newWd }),
            });
            if (!resp.ok) {
              const err = await resp.json();
              alert('无法切换：' + (err.detail || resp.statusText));
              return;
            }
            const conv = await resp.json();
            this.currentConv.workdir = conv.workdir;
            this.workdirInput = conv.workdir;
            this.showWorkdirEditor = false;
          } catch (e) {
            alert('错误：' + e.message);
          }
        },

        // ── 发送消息 ──
        // 关键设计：streaming 状态绑定到 conv 对象（_streamBuf / _isStreaming 等），
        // 不依赖 this.messages 索引。这样用户切到其他对话再切回来，buffer 完整恢复；
        // 不同对话各自独立 streaming，互不干扰。
        async sendMessage(opts = {}) {
          const isResume = !!opts.resume;
          const text = this.input.trim();
          const hasFiles = this.pendingFiles.length > 0;
          const hasImages = this.pendingImages.length > 0;
          const curConv = this.conversations.find(c => c.id === this.currentId);

          if (!isResume) {
            // 文字/文件/图片 至少一个；当前 conv 正在 streaming 时不重发
            if ((!text && !hasFiles && !hasImages) || curConv?._isStreaming) return;
          } else {
            // resume：当前 conv 必须有撞墙标记 + 不在 streaming
            if (!curConv?.truncated || curConv?._isStreaming) return;
          }

          // 先上传文件（resume 时跳过）
          let uploadedNames = [];
          if (!isResume && hasFiles) {
            try {
              uploadedNames = await this.uploadPending();
            } catch (e) {
              alert('上传失败：' + e.message);
              return;
            }
          }

          let userMsg = isResume ? '' : text;
          if (!isResume && uploadedNames.length) {
            const line = `📎 已上传到工作目录：${uploadedNames.join('、')}`;
            userMsg = text ? `${text}\n\n${line}` : line;
          }
          const imagesToSend = (!isResume && hasImages) ? [...this.pendingImages] : [];
          if (!isResume) this.pendingImages = [];

          // ── streaming 状态写入 conv 对象 ──
          const sentConvId = this.currentId;
          const sentConv = this.conversations.find(c => c.id === sentConvId);
          if (!sentConv) return;
          sentConv._isStreaming = true;
          sentConv._streamBuf = '';
          sentConv._streamToolStatus = '';
          sentConv._streamFiles = [];
          sentConv._streamUserMsg = userMsg;
          sentConv._streamUserImages = imagesToSend;
          // resume 时清掉撞墙标记（视觉上"继续"按钮消失）
          if (isResume) {
            sentConv.truncated = false;
            sentConv.truncated_reason = '';
          }

          // 如果用户当前还在该 conv，push 到 view 显示乐观渲染
          // resume 模式：不 push user message，只 push 占位 assistant
          if (sentConvId === this.currentId) {
            if (!isResume) {
              const localMsg = { role: 'user', content: userMsg };
              if (imagesToSend.length) localMsg._localImages = imagesToSend;
              this.messages.push(localMsg);
            }
            this.messages.push({
              role: 'assistant',
              content: '',
              files: [],
              streaming: true,
            });
            this.streaming = true;
            this.toolStatus = '';
          }

          if (!isResume) this.input = '';
          this.$nextTick(() => {
            this.scrollToBottom();
            this.$refs.inputEl?.focus();
          });

          try {
            this.abortController = new AbortController();
            const resp = await fetch('/api/chat', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              signal: this.abortController.signal,
              body: JSON.stringify({
                thread_id: sentConvId,
                message: userMsg,
                images: imagesToSend,
                resume: isResume,
              }),
            });
            if (!resp.ok) {
              sentConv._streamBuf = `请求失败：${resp.status} ${resp.statusText}`;
              this._syncStreamToView(sentConvId, sentConv, true);
              return;
            }
            await this.consumeSSE(resp, sentConvId, sentConv);
          } catch (e) {
            if (e.name === 'AbortError') {
              sentConv._streamBuf = (sentConv._streamBuf || '') + '\n\n_（已停止生成）_';
            } else {
              sentConv._streamBuf = (sentConv._streamBuf || '') + `\n\n**[错误]** ${e.message}`;
            }
            this._syncStreamToView(sentConvId, sentConv, true);
          } finally {
            this.abortController = null;
            sentConv._isStreaming = false;
            // 只在用户当前还在该 conv 时清全局 streaming 标志
            if (sentConvId === this.currentId) {
              this.streaming = false;
              this.toolStatus = '';
            }
          }
        },

        // 停止生成：abort fetch 请求
        stopStreaming() {
          if (this.abortController) {
            this.abortController.abort();
            // abortController 在 finally 中会被置 null
          }
        },

        // 取消正在运行的命令（终端面板的「停止」按钮）
        async cancelCommand() {
          if (!this.terminalTaskId) return;
          try {
            await fetch('/api/command/cancel', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({task_id: this.terminalTaskId}),
            });
            this.terminalLines.push({tag: 'done', text: '（用户取消了命令）'});
            this.terminalDone = true;
          } catch (e) {
            this.terminalLines.push({tag: 'stderr', text: `取消失败: ${e.message}`});
          }
        },

        // 打开后台任务面板 + 加载任务列表
        async openTaskPanel() {
          this.taskCardOpen = !this.taskCardOpen;
          if (this.taskCardOpen) {
            await this.loadTasks();
          }
        },

        // 从 /api/tasks 加载任务列表
        async loadTasks() {
          try {
            const resp = await fetch('/api/tasks');
            this.tasks = await resp.json();
          } catch (e) {
            console.error('加载任务列表失败', e);
          }
        },

        // 点击任务行展开详情
        async selectTask(taskId) {
          if (this.taskDetail?.id === taskId) {
            this.taskDetail = null;  // 再次点击收起
            return;
          }
          this.taskDetailLoading = true;
          try {
            const resp = await fetch(`/api/tasks/${taskId}`);
            this.taskDetail = await resp.json();
          } catch (e) {
            console.error('加载任务详情失败', e);
          } finally {
            this.taskDetailLoading = false;
          }
        },

        // 取消后台任务
        async cancelTaskById(taskId) {
          try {
            await fetch(`/api/tasks/${taskId}/cancel`, {method: 'POST'});
            await this.loadTasks();
          } catch (e) {
            console.error('取消任务失败', e);
          }
        },

        // 删除后台任务（从列表移除）
        async deleteTask(taskId) {
          try {
            await fetch(`/api/tasks/${taskId}`, {method: 'DELETE'});
            if (this.taskDetail?.id === taskId) this.taskDetail = null;
            await this.loadTasks();
          } catch (e) {
            console.error('删除任务失败', e);
          }
        },

        // 后台任务运行中的数量（computed-like getter）
        get taskRunningCount() {
          return this.tasks.filter(t => t.status === 'running').length;
        },

        // 把 conv._streamBuf 内容同步到当前 view（仅当用户还在该 conv）
        // finalize=true 时把 assistant 消息的 streaming 标志也清掉
        _syncStreamToView(sentConvId, sentConv, finalize = false) {
          if (sentConvId !== this.currentId) return;
          for (let i = this.messages.length - 1; i >= 0; i--) {
            const m = this.messages[i];
            if (m && m.role === 'assistant' && m.streaming) {
              this.messages[i].content = sentConv._streamBuf || '';
              if (finalize) {
                this.messages[i].streaming = false;
                this.messages[i].files = sentConv._streamFiles || [];
              }
              break;
            }
          }
        },

        async consumeSSE(resp, sentConvId, sentConv) {
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true }).replace(/\r\n/g, '\n');
            let i;
            while ((i = buffer.indexOf('\n\n')) !== -1) {
              const block = buffer.slice(0, i);
              buffer = buffer.slice(i + 2);
              this.handleSSEBlock(block, sentConvId, sentConv);
            }
          }
        },

        handleSSEBlock(block, sentConvId, sentConv) {
          let event = 'message';
          const dataLines = [];
          for (const line of block.split('\n')) {
            if (line.startsWith('event:')) event = line.slice(6).trim();
            else if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
          }
          const dataStr = dataLines.join('\n');
          if (!dataStr) return;

          let payload;
          try { payload = JSON.parse(dataStr); } catch { return; }

          const inView = (sentConvId === this.currentId);

          if (event === 'delta') {
            sentConv._streamBuf = (sentConv._streamBuf || '') + payload.text;
            if (inView) this._syncStreamToView(sentConvId, sentConv, false);
            if (inView) this.scrollToBottom();
          } else if (event === 'tool_call') {
            sentConv._streamToolStatus = payload.tool;
            if (inView) this.toolStatus = payload.tool;
          } else if (event === 'todo_update') {
            // 仅当用户在该 conv 时更新浮卡（每个对话有独立 todos）
            if (inView) {
              this.todos = payload.items || [];
              if (this.todos.length >= 2 && !this.todoCardOpen) {
                this.todoCardOpen = true;
              }
            }
          } else if (event === 'command_output') {
            // 实时终端输出
            if (inView) {
              this.terminalOpen = true;
              this.terminalLines.push({tag: payload.tag || 'stdout', text: payload.text || ''});
              this.terminalTaskId = payload.task_id || '';
              this.terminalDone = false;
              this.$nextTick(() => {
                const el = this.$refs.terminalBody;
                if (el) el.scrollTop = el.scrollHeight;
              });
            }
          } else if (event === 'command_done') {
            if (inView) {
              this.terminalDone = true;
              this.terminalLines.push({tag: 'done', text: payload.text || `进程结束 (exit: ${payload.exit_code})`});
              this.terminalTaskId = payload.task_id || '';
              this.$nextTick(() => {
                const el = this.$refs.terminalBody;
                if (el) el.scrollTop = el.scrollHeight;
              });
            }
          } else if (event === 'command_background') {
            // 后台任务已启动 → 刷新任务列表 + 打开面板提示用户
            if (inView) {
              this.loadTasks();
              if (!this.taskCardOpen) this.taskCardOpen = true;
            }
          } else if (event === 'ask_user') {
            // ask_user 弹窗只在用户当前在该 conv 时弹（防干扰）；其他 conv 的请求等用户切回再处理
            if (inView) {
              this.askPrompt = {
                id: payload.id,
                question: payload.question || '',
                options: payload.options || [],
                groups: payload.groups || [],
              };
              this.askCustomInput = '';
              this.askGroupAnswers = {};  // 重置分组选择
              this.$nextTick(() => this.$refs.askInputEl?.focus());
            }
          } else if (event === 'done') {
            sentConv._streamFiles = payload.new_files || [];
            sentConv.name = payload.conv_name || sentConv.name;
            // 撞墙标记同步到 conv（前端"继续"按钮根据它显示）
            if (payload.truncated) {
              sentConv.truncated = true;
              sentConv.truncated_reason = payload.truncated_reason || '';
            }
            if (inView) {
              this._syncStreamToView(sentConvId, sentConv, true);
              if (this.currentConv && this.currentConv.id === sentConvId) {
                this.currentConv.name = sentConv.name;
                // currentConv 也要同步 truncated（HTML 里直接绑定 currentConv 字段）
                if (payload.truncated) {
                  this.currentConv.truncated = true;
                  this.currentConv.truncated_reason = payload.truncated_reason || '';
                } else {
                  this.currentConv.truncated = false;
                }
              }
              this.toolStatus = '';
              this.refreshMemoryCount();
              this.loadRecentFiles();
            } else {
              // 不在 view 但 conv 名字可能被改 → sidebar 自然更新（因为绑定 conv 对象）
            }
          } else if (event === 'error') {
            sentConv._streamBuf = (sentConv._streamBuf || '') + `\n\n**[错误]** ${payload.error}`;
            if (inView) this._syncStreamToView(sentConvId, sentConv, true);
          }
        },

        // ── 重新生成 / 编辑 ──
        async regenerate() {
          if (this.streaming) return;
          // 找到最后一条 user 消息
          if (this.messages.length < 2) return;
          const lastAssistant = this.messages.pop();
          const lastUser = this.messages.pop();
          if (lastUser.role !== 'user') {
            this.messages.push(lastUser, lastAssistant);
            return;
          }
          // 多模态消息 content 是 array 时，只回填文字部分（图片不重发）
          this.input = this.msgText(lastUser);
          await this.sendMessage();
        },

        startEdit(idx) {
          if (this.streaming) return;
          this.editingIdx = idx;
          this.editingText = this.msgText(this.messages[idx]);
        },

        cancelEdit() {
          this.editingIdx = -1;
          this.editingText = '';
        },

        async saveEdit() {
          if (this.editingIdx < 0 || this.streaming) return;
          const text = this.editingText.trim();
          if (!text) return;
          // 截断到编辑位置（含），删除之后的所有消息
          this.messages = this.messages.slice(0, this.editingIdx);
          this.editingIdx = -1;
          this.input = text;
          this.editingText = '';
          await this.sendMessage();
        },

        // ── 文件上传 ──
        addFiles(fileList) {
          for (const f of fileList) {
            this.pendingFiles.push(f);
          }
        },

        async addImages(fileList) {
          // 把图片读成 base64 data URL 暂存到 pendingImages
          for (const f of fileList) {
            if (!f.type.startsWith('image/')) {
              alert(`${f.name} 不是图片，跳过`);
              continue;
            }
            if (f.size > 10 * 1024 * 1024) {
              alert(`${f.name} 超过 10MB，跳过（MiMo 单图上限 50MB，但 base64 编码后会膨胀 ~33%）`);
              continue;
            }
            try {
              const url = await this.readAsDataURL(f);
              this.pendingImages.push(url);
            } catch (e) {
              alert(`${f.name} 读取失败: ${e.message}`);
            }
          }
        },

        readAsDataURL(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error('FileReader 失败'));
            reader.readAsDataURL(file);
          });
        },

        // 从消息中提取纯文本（兼容旧多模态 array content + 新纯 string）
        msgText(msg) {
          if (!msg) return '';
          if (typeof msg.content === 'string') return msg.content;
          if (Array.isArray(msg.content)) {
            return msg.content
              .filter(p => p.type === 'text')
              .map(p => p.text || '')
              .join('\n');
          }
          return '';
        },

        // 渲染时去掉给 LLM 看的 `[已上传图片：img_xxx ...]` 占位（用户不需要看到协议提示）
        stripImageRef(text) {
          if (!text) return '';
          return text.replace(/\[已上传图片：[^\]]*\]/g, '').trim();
        },

        // 该消息有图片要显示？（msg.images 来自 server / msg._localImages 是本地乐观）
        msgHasImages(msg) {
          return !!(msg && (
            (Array.isArray(msg.images) && msg.images.length) ||
            (Array.isArray(msg._localImages) && msg._localImages.length)
          ));
        },

        // 返回该消息要展示的所有图片 src（server 端的拼成 url；本地 dataURL 直传）
        msgImageSrcs(msg) {
          if (!msg) return [];
          const out = [];
          // 优先 server 端（持久化、刷新可见）
          if (Array.isArray(msg.images)) {
            for (const iid of msg.images) {
              out.push(`/api/conversations/${this.currentId}/image/${iid}`);
            }
          }
          // 本地乐观：只在 server 端 images 不存在时使用（避免双份）
          if (out.length === 0 && Array.isArray(msg._localImages)) {
            for (const url of msg._localImages) out.push(url);
          }
          return out;
        },

        async uploadPending() {
          if (!this.pendingFiles.length) return [];
          const fd = new FormData();
          const fallbackNames = [];
          for (const f of this.pendingFiles) {
            fd.append('files', f);
            fallbackNames.push(f.name);
          }
          const resp = await fetch(`/api/conversations/${this.currentId}/upload`, {
            method: 'POST',
            body: fd,
          });
          if (!resp.ok) {
            const errText = await resp.text().catch(() => resp.statusText);
            throw new Error(`${resp.status}: ${errText}`);
          }
          const data = await resp.json();
          this.pendingFiles = [];
          return data.saved || fallbackNames;
        },

        handlePaste(e) {
          // 粘贴剪贴板里的图片 / 文件 —— 图片走"贴图给有希看"路径（→ MiMo 识别），
          // 其他文件走"上传到工作目录"路径
          const fl = e.clipboardData?.files;
          if (!fl || !fl.length) return;
          e.preventDefault();
          const images = [];
          const others = [];
          for (const f of fl) {
            if (f.type && f.type.startsWith('image/')) {
              images.push(f);
            } else {
              others.push(f);
            }
          }
          if (images.length) this.addImages(images);
          if (others.length) this.addFiles(others);
        },

        // ── 渲染 ──
        // renderMarkdown 委托给 _renderMarkdownCached（脚本顶部定义的全局函数）。
        // 缓存按 text 内容查表 —— 同样 text 直接返回，不重跑 marked/hljs/DOMPurify。
        // 子对话跳转链接格式 [→ name](#sub=id) 由 marked 渲染成标准 anchor，
        // CSS 用 a[href^="#sub="] 选择器渲染成 chip；
        // 全局 click delegation 拦截这些 href 转 selectConversation。
        renderMarkdown(text) {
          return _renderMarkdownCached(text);
        },

        // ── 工具 ──
        async copyToClipboard(text) {
          try {
            await navigator.clipboard.writeText(text);
          } catch (e) { console.warn(e); }
        },

        scrollToBottom() {
          this.$nextTick(() => {
            const el = this.$refs.messagesEl;
            if (el) el.scrollTop = el.scrollHeight;
          });
        },

        streamingHint(msg) {
          // 状态优先级：调用工具中 > 思考中（无内容）> 生成中（有内容）
          if (this.toolStatus) return `调用 ${this.toolStatus} 中…`;
          if (!this.msgText(msg)) return '思考中…';
          return '生成中…';
        },

        // 持久化的 conv.json 含完整 ReAct 序列（含 tool 消息和"只有 tool_calls
        // 没文本"的中间 assistant 消息）。这些是给 LLM 用的内部状态，不该显示
        // 给主人 —— 否则切回历史对话时会"露出搜索过程 / 思考过程"。
        isVisibleMessage(msg) {
          if (!msg || !msg.role) return false;
          if (msg.role === 'user') {
            // 文本可见，或者有图片缩略图要展示
            if (this.msgHasImages(msg)) return true;
            const txt = this.msgText(msg);
            return !!(txt && (typeof txt === 'string' ? txt.trim() : true));
          }
          if (msg.role === 'assistant') {
            // 流式中要显示（含空 content 时的"思考中"状态条）
            // 持久化的旧消息：content 非空才显示（过滤掉中间 tool_call 决策消息）
            const txt = this.msgText(msg);
            return !!msg.streaming || !!(txt && txt.trim());
          }
          // tool 消息现在显示为步骤卡（紧凑样式）
          if (msg.role === 'tool') return true;
          // system 永不展示
          return false;
        },

        // ── 工具步骤卡 helpers ──
        // 给 role=tool 消息找它对应的 tool_call（含工具名 + 参数）
        // 上一条 assistant 的 tool_calls 数组里 id 匹配的那个
        findToolCallForTool(toolMsg) {
          if (!toolMsg || !toolMsg.tool_call_id) return null;
          for (let i = this.messages.length - 1; i >= 0; i--) {
            const m = this.messages[i];
            if (m.role === 'assistant' && Array.isArray(m.tool_calls)) {
              const tc = m.tool_calls.find(t => t && t.id === toolMsg.tool_call_id);
              if (tc) return tc;
            }
          }
          return null;
        },

        // 工具图标（按工具名分类）
        toolIcon(name) {
          const map = {
            // 信息获取
            'web_search': '🔍', 'fetch_webpage': '🌐', 'recall': '🧠',
            'audit_query': '📋',
            // 文件
            'read_file': '📖', 'write_file': '✍️', 'edit_file': '✏️',
            'grep': '🔎', 'glob': '📁',
            // 执行
            'calculate': '🔢', 'execute_code': '🐍', 'run_command': '💻',
            // 记忆
            'remember': '💾', 'update_memory': '✏️', 'merge_memories': '🔗',
            'forget_memory': '🗑️', 'restore_memory': '↩️', 'list_trash': '🗃️',
            // 对话
            'ask_user': '❓', 'todo_write': '📝', 'todo_read': '📝',
            'vision_describe': '👁️', 'spawn_sub_conversation': '🌳',
            // 自修改
            'self_read_file': '📖', 'self_edit_file': '✏️',
            'self_write_file': '✍️', 'self_edit_with_test': '🧪',
            'self_rollback': '↩️', 'self_diff': '📊',
            // 任务管理
            'plan_task': '🗺️', 'verify_change': '✅', 'write_postmortem': '📔',
            'screenshot_and_describe': '📸',
            // 编程
            'lint': '🔍', 'format_code': '🎨', 'run_tests': '🧪',
            'apply_patch': '🩹', 'find_references': '🔗',
            // 技能
            'define_skill': '⭐', 'delete_skill': '🗑️', 'list_skills': '📦',
            'restore_skill': '↩️',
            // 系统
            'get_current_datetime': '🕒', 'request_pip_install': '📦',
          };
          return map[name] || '🔧';
        },

        // tool message 的简短参数预览（取前 N 个 key:value）
        toolArgsPreview(toolCall, maxLen = 80) {
          if (!toolCall || !toolCall.arguments) return '';
          const args = toolCall.arguments;
          const parts = [];
          for (const [k, v] of Object.entries(args)) {
            if (parts.length >= 3) break;
            let vs = typeof v === 'string' ? v : JSON.stringify(v);
            if (vs.length > 30) vs = vs.slice(0, 27) + '...';
            parts.push(`${k}=${vs}`);
          }
          const joined = parts.join(', ');
          return joined.length > maxLen ? joined.slice(0, maxLen - 3) + '...' : joined;
        },

        // tool result 的状态：✓ 成功 / ✗ 失败 / 🔄 进行中（流式）
        toolResultStatus(toolMsg) {
          const txt = (toolMsg.content || '').toString();
          if (!txt) return '🔄';
          // 看常见失败标记
          if (/^❌|\[执行失败|\[启动失败|\[错误\]|^Error:|Traceback/m.test(txt)) return '✗';
          if (/^⚠️/m.test(txt)) return '⚠';
          return '✓';
        },

        // tool result 摘要预览（折叠态显示）
        toolResultPreview(toolMsg, maxLen = 120) {
          const txt = (toolMsg.content || '').toString().trim();
          if (!txt) return '(无输出)';
          // 取首行，去掉常见前缀
          const firstLine = txt.split('\n').find(l => l.trim()) || '';
          return firstLine.length > maxLen ? firstLine.slice(0, maxLen - 3) + '...' : firstLine;
        },

        // 折叠/展开步骤卡详情
        toggleStep(idx) {
          this.expandedSteps[idx] = !this.expandedSteps[idx];
        },

        // ── 最近文件 / @mention 补全 ──────────────────────────────────────
        async loadRecentFiles() {
          // 平铺最近修改的 50 个文件（已 server 端过滤 venv/缓存/.bak 等）
          // 仅供 @mention 补全用；UI 显示走 fileTree
          if (!this.currentId) return;
          try {
            const resp = await fetch(`/api/conversations/${this.currentId}/files`);
            if (!resp.ok) return;
            this.recentFiles = await resp.json();
          } catch (e) { /* 静默 */ }
          // 同时刷新树（如果浮卡正打开）
          if (this.workdirCardOpen) this.loadFileTree();
        },

        // ── 文件树（浮卡显示用，已过滤 venv 等）──
        async loadFileTree() {
          if (!this.currentId) return;
          try {
            const resp = await fetch(`/api/conversations/${this.currentId}/files/tree`);
            if (!resp.ok) return;
            this.fileTree = await resp.json();
          } catch (e) { /* 静默 */ }
        },

        toggleDir(path) {
          this.expandedDirs[path] = !this.expandedDirs[path];
        },

        // 把 tree 按当前展开状态扁平化（顺序遍历 + 缩进 depth）
        flatFileTree() {
          const out = [];
          const walk = (nodes, depth) => {
            for (const n of nodes || []) {
              out.push({ ...n, depth });
              if (n.is_dir && n.children && this.expandedDirs[n.path]) {
                walk(n.children, depth + 1);
              }
            }
          };
          walk(this.fileTree, 0);
          return out;
        },

        // 按扩展名选图标
        fileIcon(name) {
          const ext = (name.split('.').pop() || '').toLowerCase();
          const map = {
            py: '🐍', js: '🟨', ts: '🟦', jsx: '⚛️', tsx: '⚛️',
            html: '🌐', css: '🎨', json: '📋', yaml: '📋', yml: '📋', toml: '⚙️',
            md: '📝', txt: '📄', log: '📋',
            png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️', ico: '🖼️',
            pdf: '📕', docx: '📘', doc: '📘', xlsx: '📗', xls: '📗', pptx: '📙',
            zip: '📦', tar: '📦', gz: '📦', '7z': '📦', rar: '📦',
            sh: '⚙️', bat: '⚙️', ps1: '⚙️', spec: '⚙️',
            mp3: '🎵', wav: '🎵', mp4: '🎬', mov: '🎬',
            env: '🔐', gitignore: '🔧',
          };
          return map[ext] || '📄';
        },

        formatSize(bytes) {
          if (!bytes) return '0 B';
          const units = ['B', 'KB', 'MB', 'GB'];
          let i = 0;
          while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
          return `${bytes.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
        },

        // 用系统文件管理器打开当前工作目录
        async openWorkdir() {
          if (!this.currentId) return;
          try {
            const resp = await fetch(`/api/conversations/${this.currentId}/open`, {
              method: 'POST',
            });
            if (!resp.ok) {
              const detail = await resp.json().catch(() => ({}));
              alert('打开失败：' + (detail.detail || resp.statusText));
            }
          } catch (e) {
            alert('打开失败：' + e.message);
          }
        },

        insertFileMention(path) {
          // 点击 chip 时，在 input 当前光标位置插入 "@<path> "
          const el = this.$refs.inputEl;
          if (!el) return;
          const pos = el.selectionStart ?? this.input.length;
          this.input = this.input.slice(0, pos) + `@${path} ` + this.input.slice(pos);
          this.$nextTick(() => {
            el.focus();
            const newPos = pos + path.length + 2;
            el.selectionStart = el.selectionEnd = newPos;
          });
        },

        onInputChange() {
          // 监听 input 事件，检测光标前是否是 @xxx 模式
          const el = this.$refs.inputEl;
          if (!el) { this.mentionOpen = false; return; }
          const pos = el.selectionStart;
          const before = this.input.slice(0, pos);
          const m = before.match(/@(\S*)$/);
          if (!m) {
            this.mentionOpen = false;
            return;
          }
          const q = m[1].toLowerCase();
          this.mentionFiles = this.recentFiles
            .filter(f => f.path.toLowerCase().includes(q))
            .slice(0, 8);
          this.mentionOpen = this.mentionFiles.length > 0;
          this.mentionIdx = 0;
        },

        selectMention(file) {
          // 从 dropdown 选中一项时，把光标前的 "@xxx" 替换为 "@<完整路径> "
          const el = this.$refs.inputEl;
          if (!el) return;
          const pos = el.selectionStart ?? this.input.length;
          const before = this.input.slice(0, pos);
          const after = this.input.slice(pos);
          const m = before.match(/@(\S*)$/);
          if (!m) { this.mentionOpen = false; return; }
          const start = pos - m[0].length;
          this.input = this.input.slice(0, start) + `@${file.path} ` + after;
          this.mentionOpen = false;
          this.$nextTick(() => {
            el.focus();
            const newPos = start + file.path.length + 2;
            el.selectionStart = el.selectionEnd = newPos;
          });
        },

        // ── 文件预览（图片 / PDF / docx / 其他下载）───────────────────────
        isImageFile(f) {
          return /\.(png|jpg|jpeg|gif|webp|bmp|svg)$/i.test(f);
        },
        isPdfFile(f) {
          return /\.pdf$/i.test(f);
        },
        isDocxFile(f) {
          return /\.docx$/i.test(f);
        },
        fileUrl(f, download = false) {
          const q = encodeURIComponent(f);
          return `/api/conversations/${this.currentId}/file?path=${q}` + (download ? '&download=true' : '');
        },
        toggleDocxPreview(file) {
          this.docxOpen = { ...this.docxOpen, [file]: !this.docxOpen[file] };
          if (this.docxOpen[file] && !this.docxCache[file]) {
            this.loadDocxPreview(file);
          }
        },
        async loadDocxPreview(file) {
          this.docxCache = { ...this.docxCache, [file]: '加载中…' };
          try {
            const r = await fetch(`/api/conversations/${this.currentId}/preview?path=${encodeURIComponent(file)}`);
            const d = await r.json();
            this.docxCache = { ...this.docxCache, [file]: d.text || d.error || '无法预览' };
          } catch (e) {
            this.docxCache = { ...this.docxCache, [file]: '加载失败: ' + e.message };
          }
        },

        // ── 导出 ──
        exportConversation() {
          if (!this.messages.length) return;
          const lines = [`# ${this.currentConv.name}`, ''];
          for (const m of this.messages) {
            lines.push(m.role === 'user' ? '## 你' : '## 有希');
            lines.push('');
            lines.push(m.content);
            lines.push('');
            if (m.files && m.files.length) {
              lines.push('生成文件：');
              for (const f of m.files) lines.push(`- ${f}`);
              lines.push('');
            }
          }
          const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `${this.currentConv.name.replace(/[\\/:*?"<>|]/g, '_')}.md`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
        },
      };
    }
  </script>

  <!-- 代码块复制按钮全局 handler（renderMarkdown 注入的 button onclick 调这个） -->
  <script>
    window.__yukiCopyCode = function (btn) {
      if (!btn) return;
      const pre = btn.closest('pre');
      if (!pre) return;
      const code = pre.querySelector('code');
      const text = code ? code.textContent : pre.textContent.replace(/⧉ 复制\s*/, '');
      const ok = () => {
        const orig = btn.textContent;
        btn.textContent = '✓ 已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 1500);
      };
      const fail = (err) => {
        console.warn('copy failed:', err);
        btn.textContent = '✗ 失败';
        setTimeout(() => { btn.textContent = '⧉ 复制'; }, 1500);
      };
      // 优先用 clipboard API；不支持时用旧的 execCommand 兜底
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(ok, fail);
      } else {
        // 旧 webview / 没 https / 没 clipboard 权限时
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          const success = document.execCommand('copy');
          ta.remove();
          success ? ok() : fail('execCommand returned false');
        } catch (e) { fail(e); }
      }
    };
  </script>
