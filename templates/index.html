<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>信息统合思念体</title>
  {% if icon_url %}<link rel="icon" href="{{ icon_url }}" />{% endif %}

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6B5BA5',
            'primary-light': '#8676BD',
            'primary-dark': '#4E4080',
          },
          fontFamily: {
            sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- 第三方库 CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link id="hljs-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="/static/style.css" />

  <!-- 主题管理（早期执行，避免首屏闪深色）：localStorage 持久化，独立于 Alpine -->
  <script>
    (function () {
      const KEY = 'yuki-theme';
      const HLJS_DARK  = 'https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-dark.min.css';
      const HLJS_LIGHT = 'https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-light.min.css';
      function apply(mode) {
        document.body.classList.toggle('theme-light', mode === 'light');
        const hl = document.getElementById('hljs-theme');
        if (hl) hl.href = mode === 'light' ? HLJS_LIGHT : HLJS_DARK;
      }
      window._yukiTheme = {
        get: () => localStorage.getItem(KEY) || 'dark',
        set: (mode) => { localStorage.setItem(KEY, mode); apply(mode); },
        toggle: () => {
          const next = (localStorage.getItem(KEY) || 'dark') === 'dark' ? 'light' : 'dark';
          localStorage.setItem(KEY, next);
          apply(next);
          return next;
        },
      };
      // 首屏即时应用（body 还没解析，所以 toggle class 等 DOMContentLoaded）
      if (document.body) apply(window._yukiTheme.get());
      else document.addEventListener('DOMContentLoaded', () => apply(window._yukiTheme.get()), { once: true });
    })();
  </script>

  {% if background_url %}
  <style>
    /* 夜晚主题背景图 (assets/background.png, 1260x792, 比 16:9 略窄):
       cover  → 宽度优先铺满，避免左右出现接缝（之前 repeat 平铺会拼）
       center → 上下各裁等量，保留画面中央
       no-repeat → 单张，不平铺
       white 主题在 static/style.css 用同样策略覆盖 day_bg.png */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url('{{ background_url }}');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(15, 15, 25, 0.45), rgba(15, 15, 25, 0.7));
      z-index: -1;
    }
  </style>
  {% endif %}
</head>

<body class="bg-zinc-900 text-zinc-100 h-screen overflow-hidden font-sans">

  <!-- 雪花动画背景层 -->
  <div class="snow-layer pointer-events-none fixed inset-0 z-0"></div>

  <div x-data="chatApp()" x-init="init()" class="relative z-10 flex h-screen">

    <!-- ─── 左侧栏 ───────────────────────────────────────────────────────── -->
    <aside
      class="w-64 shrink-0 flex flex-col glass-panel border-r border-white/10"
      x-show="!sidebarCollapsed"
      x-transition.opacity
    >
      <div class="px-4 h-16 border-b border-white/10 flex items-center justify-between shrink-0">
        <h1 class="text-base font-semibold tracking-wider">信息统合思念体</h1>
        <button
          @click="sidebarCollapsed = true"
          class="text-zinc-400 hover:text-zinc-100 transition"
          title="折叠侧栏 (Ctrl+B)"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>

      <!-- 模型选择（自定义 dropdown，避免浏览器原生 select 的蓝色高亮） -->
      <div class="px-4 py-3 border-b border-white/5">
        <label class="text-xs text-zinc-400 uppercase tracking-wider">模型</label>
        <div class="relative mt-1" @click.outside="modelDropdownOpen = false">
          <button
            @click="modelDropdownOpen = !modelDropdownOpen"
            class="w-full bg-zinc-800/60 border border-white/10 hover:border-white/20
                   rounded-md px-3 py-1.5 text-sm text-left flex items-center justify-between transition"
            :class="modelDropdownOpen ? 'border-primary-light/40' : ''"
          >
            <span x-text="models[currentModel]"></span>
            <svg
              class="w-3.5 h-3.5 opacity-60 transition-transform shrink-0 ml-2"
              :class="modelDropdownOpen ? 'rotate-180' : ''"
              fill="none" stroke="currentColor" viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div
            x-show="modelDropdownOpen"
            x-transition.opacity.duration.150ms
            class="absolute top-full left-0 right-0 mt-1 rounded-md py-1 z-50 overflow-hidden
                   bg-zinc-900/95 backdrop-blur-md border border-white/15 shadow-2xl shadow-black/50"
          >
            <template x-for="(name, id) in models" :key="id">
              <button
                @click="currentModel = id; modelDropdownOpen = false; updateModel()"
                class="w-full text-left px-3 py-2 text-sm transition"
                :class="id === currentModel
                  ? 'bg-primary/40 text-white'
                  : 'text-zinc-200 hover:bg-white/10'"
                x-text="name"
              ></button>
            </template>
          </div>
        </div>
      </div>

      <!-- 新对话按钮 + 三选下拉 -->
      <div class="px-4 py-3 relative">
        <button
          @click="newConvMenuOpen = !newConvMenuOpen"
          class="w-full bg-primary hover:bg-primary-light text-white rounded-md py-2 text-sm font-medium
                 transition shadow-lg shadow-primary/20 flex items-center justify-center gap-1.5"
          title="新对话 (Ctrl+N)"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          新对话
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <!-- 三选下拉 -->
        <div
          x-show="newConvMenuOpen"
          x-transition.opacity.duration.100ms
          @click.outside="newConvMenuOpen = false"
          class="absolute left-4 right-4 mt-1 z-50 rounded-lg overflow-hidden
                 border border-white/15 shadow-2xl shadow-black/80"
          style="background: rgb(17, 17, 22); backdrop-filter: blur(24px);"
        >
          <button
            @click="newConversation('standalone'); newConvMenuOpen = false"
            class="w-full text-left px-3 py-2.5 hover:bg-white/5 text-sm flex flex-col gap-0.5 transition"
          >
            <span class="font-medium text-zinc-100">独立对话</span>
            <span class="text-[10px] text-zinc-500">不挂在主对话下，完全独立</span>
          </button>
          <button
            x-show="hasMaster"
            @click="newConversation('sub', 'advanced'); newConvMenuOpen = false"
            class="w-full text-left px-3 py-2.5 hover:bg-orange-500/10 text-sm flex flex-col gap-0.5 transition border-t border-white/5"
          >
            <span class="font-medium text-orange-300">🛡️ 高级模式子对话</span>
            <span class="text-[10px] text-zinc-500">权限 ≈ 主对话；自我优化等危险任务用</span>
          </button>
          <button
            x-show="hasMaster"
            @click="newConversation('sub', 'restricted'); newConvMenuOpen = false"
            class="w-full text-left px-3 py-2.5 hover:bg-blue-500/10 text-sm flex flex-col gap-0.5 transition border-t border-white/5"
          >
            <span class="font-medium text-blue-300">🔒 受限模式子对话</span>
            <span class="text-[10px] text-zinc-500">破坏性操作需主人批准；日常任务用</span>
          </button>
        </div>
      </div>

      <!-- 对话列表 -->
      <div class="flex-1 overflow-y-auto px-2 pb-4 space-y-1 scrollbar-thin">
        <!-- 主对话"有希"永远顶部，金色高亮 -->
        <template x-if="masterConv">
          <div
            class="group flex items-center gap-2 px-2.5 py-2.5 rounded-md cursor-pointer text-sm transition mb-1
                   border border-amber-400/40 bg-gradient-to-r from-amber-500/20 to-yellow-500/10"
            :class="masterConv.id === currentId ? 'ring-2 ring-amber-400/60' : 'hover:from-amber-500/30 hover:to-yellow-500/20'"
            @click="selectConversation(masterConv.id)"
          >
            <span class="text-base">👑</span>
            <span class="truncate flex-1 text-amber-100 font-medium" x-text="masterConv.name"></span>
            <span class="text-[10px] text-amber-300/70">主对话</span>
          </div>
        </template>

        <!-- 其他对话按时间抽屉分组 -->
        <template x-for="bucket in convBuckets" :key="bucket.label">
          <div x-show="bucket.items.length > 0" class="mb-1">
            <button
              @click="bucket.collapsed = !bucket.collapsed"
              class="w-full flex items-center gap-1.5 px-2 py-1 text-[11px] uppercase tracking-wider
                     text-zinc-500 hover:text-zinc-300 transition select-none"
            >
              <svg class="w-3 h-3 transition-transform"
                   :class="bucket.collapsed ? '-rotate-90' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
              <span x-text="bucket.label"></span>
              <span class="ml-auto text-[10px]" x-text="`${bucket.items.length}`"></span>
            </button>
            <div x-show="!bucket.collapsed" class="space-y-0.5">
              <template x-for="conv in bucket.items" :key="conv.id">
                <div
                  class="group flex items-center gap-2 px-2.5 py-2 rounded-md cursor-pointer text-sm transition"
                  :class="conv.id === currentId
                    ? 'bg-primary/30 text-white'
                    : 'text-zinc-300 hover:bg-white/5'"
                  @click="selectConversation(conv.id)"
                  :title="convTooltip(conv)"
                >
                  <!-- 类型小图标 -->
                  <span class="shrink-0 text-xs" x-text="convTypeIcon(conv)"></span>
                  <span class="truncate flex-1"
                        x-text="conv.name"
                        @dblclick.stop="startRename(conv)"></span>
                  <!-- 待批准摘要徽章 -->
                  <span x-show="conv.summary_pending_approval"
                        class="text-[9px] px-1 py-0.5 rounded bg-amber-500/30 text-amber-200">待批</span>
                  <button
                    @click.stop="deleteConversation(conv.id)"
                    class="opacity-0 group-hover:opacity-100 text-zinc-400 hover:text-red-400 transition"
                    title="删除"
                  >
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a2 2 0 012-2h2a2 2 0 012 2v3"/>
                    </svg>
                  </button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- 底部：后台任务 + 记忆库 + 导出对话 -->
      <div class="px-4 py-3 border-t border-white/5 text-xs text-zinc-500 flex items-center justify-between">
        <button
          @click="openTaskPanel()"
          class="hover:text-zinc-300 transition flex items-center gap-1"
          title="后台任务管理器"
        >
          ⚡ 后台任务
          <span x-show="taskRunningCount > 0" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
        </button>
        <button
          @click="openMemoryModal()"
          class="hover:text-zinc-300 transition flex items-center gap-1"
          title="长期记忆库"
        >
          📚 记忆库
          <span x-show="memoryCount > 0" class="text-zinc-400" x-text="`(${memoryCount})`"></span>
        </button>
        <button
          @click="exportConversation()"
          class="hover:text-zinc-300 transition"
          title="导出当前对话为 Markdown (Ctrl+S)"
        >
          ↓ 导出
        </button>
      </div>
    </aside>

    <!-- 折叠侧栏时显示的小按钮 -->
    <button
      x-show="sidebarCollapsed"
      x-transition.opacity
      @click="sidebarCollapsed = false"
      class="fixed top-3 left-3 z-30 w-9 h-9 rounded-md glass-panel
             flex items-center justify-center text-zinc-300 hover:text-white transition"
      title="展开侧栏 (Ctrl+B)"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- ─── 主区 ──────────────────────────────────────────────────────────── -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- 顶部 header -->
      <header class="px-6 h-16 border-b border-white/10 flex items-center justify-center shrink-0 relative">
        <div class="flex items-center gap-3 min-w-0">
          <h2
            class="text-base font-semibold tracking-wider truncate"
            x-text="currentConv?.name || '加载中…'"
            @dblclick="startRename(currentConv)"
          ></h2>
          <!-- 对话类型徽章 -->
          <span x-show="currentConv?.kind === 'master'"
                class="text-[10px] px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-200 border border-amber-400/40 shrink-0">
            👑 主对话
          </span>
          <!-- 子对话权限开关（点击切换） -->
          <button
            x-show="currentConv?.kind === 'sub'"
            @click="toggleSubLevel()"
            class="text-[10px] px-2 py-0.5 rounded-full border shrink-0 transition"
            :class="currentConv?.sub_level === 'advanced'
              ? 'bg-orange-500/20 text-orange-200 border-orange-400/40 hover:bg-orange-500/30'
              : 'bg-blue-500/20 text-blue-200 border-blue-400/40 hover:bg-blue-500/30'"
            :title="currentConv?.sub_level === 'advanced' ? '高级模式 - 权限 ≈ 主对话（点击切到受限）' : '受限模式 - 破坏性操作需主人批准（点击切到高级）'"
          >
            <span x-text="currentConv?.sub_level === 'advanced' ? '🛡️ 高级模式' : '🔒 受限模式'"></span>
          </button>
        </div>
        <div class="flex items-center gap-4 shrink-0 absolute right-6">
          <!-- 摘要操作（子对话）-->
          <template x-if="currentConv?.kind === 'sub'">
            <div class="flex items-center gap-1.5">
              <button
                @click="manualSummarize()"
                class="text-xs px-2 py-1 rounded text-zinc-400 hover:text-zinc-100 hover:bg-white/5 transition"
                title="立刻汇总本对话（生成摘要）"
              >📋 汇总</button>
              <button
                x-show="currentConv?.summary && currentConv?.summary.trim()"
                @click="approveSummary(!currentConv?.summary_approved_for_master)"
                class="text-xs px-2 py-1 rounded transition flex items-center gap-1"
                :class="currentConv?.summary_approved_for_master
                  ? 'bg-emerald-500/20 text-emerald-200 hover:bg-emerald-500/30'
                  : 'bg-amber-500/20 text-amber-200 hover:bg-amber-500/30'"
                :title="currentConv?.summary_approved_for_master ? '撤销纳入主对话' : '批准纳入主对话 prompt'"
              >
                <span x-text="currentConv?.summary_approved_for_master ? '✓ 已纳入主' : '批准纳入主'"></span>
              </button>
            </div>
          </template>
          <!-- Todo 浮卡触发按钮 -->
          <button
            @click="todoCardOpen = !todoCardOpen"
            class="relative flex items-center gap-1.5 px-2 py-1 rounded text-xs
                   text-zinc-400 hover:text-zinc-100 hover:bg-white/5 transition"
            title="任务清单"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span x-text="todos.length > 0 ? `${todos.filter(t => t.status === 'completed').length}/${todos.length}` : '清单'"></span>
            <!-- in_progress 时显示一个脉冲点 -->
            <span
              x-show="todos.some(t => t.status === 'in_progress')"
              class="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-primary-light animate-pulse"
            ></span>
          </button>
          <!-- 工作目录 + 最近文件浮卡触发 -->
          <button
            @click="workdirCardOpen = !workdirCardOpen; if (workdirCardOpen) { workdirInput = currentConv?.workdir || ''; loadFileTree(); }"
            class="relative flex items-center gap-1.5 px-2 py-1 rounded text-xs
                   text-zinc-400 hover:text-zinc-100 hover:bg-white/5 transition"
            title="工作目录与最近文件"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
            </svg>
            <span x-text="recentFiles.length > 0 ? `文件 ${recentFiles.length}` : '工作目录'"></span>
          </button>
          <!-- 日/夜主题切换 -->
          <button
            @click="toggleTheme()"
            class="px-2 py-1 rounded text-base leading-none hover:bg-white/5 transition"
            :title="theme === 'light' ? '切到夜间' : '切到白天'"
          ><span x-text="theme === 'light' ? '☀️' : '🌙'"></span></button>
        </div>

        <!-- Todo 浮卡（绝对定位在 header 下方右侧） -->
        <div
          x-show="todoCardOpen"
          x-transition.opacity.duration.150ms
          @click.outside="todoCardOpen = false"
          class="absolute right-4 top-14 z-30 w-80 max-h-96 overflow-y-auto scrollbar-thin
                 bg-zinc-900/95 border border-white/15 rounded-lg shadow-2xl shadow-black/60
                 backdrop-blur-md"
        >
          <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between sticky top-0 bg-zinc-900/95">
            <span class="text-sm font-medium tracking-wider">📋 任务清单</span>
            <span class="text-[10px] text-zinc-500" x-text="todos.length === 0 ? '空' : `${todos.filter(t => t.status === 'completed').length} / ${todos.length}`"></span>
          </div>
          <template x-if="todos.length === 0">
            <div class="px-4 py-6 text-center text-xs text-zinc-500">
              当前对话没有任务清单<br/>
              <span class="text-[10px]">复杂任务时有希会自己列</span>
            </div>
          </template>
          <ol class="py-2">
            <template x-for="(t, i) in todos" :key="i">
              <li class="px-4 py-1.5 flex items-start gap-2 text-sm"
                  :class="t.status === 'completed' ? 'opacity-60' : ''">
                <span class="mt-0.5 shrink-0 w-4 text-center"
                      x-text="t.status === 'completed' ? '✓' : t.status === 'in_progress' ? '▶' : '□'"
                      :class="t.status === 'completed' ? 'text-emerald-400'
                            : t.status === 'in_progress' ? 'text-primary-light animate-pulse'
                            : 'text-zinc-500'"></span>
                <span :class="t.status === 'completed' ? 'line-through text-zinc-400' : 'text-zinc-100'"
                      x-text="t.content"></span>
              </li>
            </template>
          </ol>
        </div>

        <!-- 工作目录 + 最近文件浮卡（绝对定位在 header 下方右侧） -->
        <div
          x-show="workdirCardOpen"
          x-transition.opacity.duration.150ms
          @click.outside="workdirCardOpen = false"
          class="absolute right-4 top-14 z-30 w-96 max-h-[28rem] overflow-y-auto scrollbar-thin
                 bg-zinc-900/95 border border-white/15 rounded-lg shadow-2xl shadow-black/60
                 backdrop-blur-md"
        >
          <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between sticky top-0 bg-zinc-900/95">
            <span class="text-sm font-medium tracking-wider">📁 工作目录</span>
            <span class="text-[10px] text-zinc-500" x-text="`${recentFiles.length} 个文件 · ${models[currentModel]}`"></span>
          </div>

          <!-- 工作目录路径 + 操作（编辑 / 打开文件夹） -->
          <div class="px-4 py-3 space-y-2 border-b border-white/10">
            <div class="text-[10px] text-zinc-500 uppercase tracking-wider">路径</div>
            <div class="flex gap-1.5">
              <input
                type="text"
                x-model="workdirInput"
                @keydown.enter.prevent="applyWorkdir(); workdirCardOpen = false"
                @keydown.escape="workdirInput = currentConv?.workdir || ''"
                class="flex-1 bg-zinc-800/60 border border-white/10 rounded px-2.5 py-1.5 text-xs font-mono
                       text-zinc-200 focus:outline-none focus:border-primary-light"
                placeholder="工作目录绝对路径"
              />
              <!-- 用系统文件管理器打开 -->
              <button
                @click="openWorkdir()"
                class="px-2 py-1 text-xs bg-zinc-800/60 hover:bg-primary/30 text-zinc-300 hover:text-white
                       border border-white/10 rounded transition shrink-0"
                title="用文件管理器打开工作目录"
              >📂 打开</button>
            </div>
            <div class="flex gap-2 justify-end">
              <button
                @click="workdirInput = currentConv?.workdir || ''"
                class="px-2 py-0.5 text-[10px] text-zinc-400 hover:text-zinc-100"
              >还原</button>
              <button
                @click="applyWorkdir(); workdirCardOpen = false"
                class="px-2.5 py-0.5 text-[10px] bg-primary hover:bg-primary-light text-white rounded"
              >应用</button>
            </div>
          </div>

          <!-- 文件树 -->
          <div class="px-4 py-3">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[10px] text-zinc-500 uppercase tracking-wider">
                文件 (已过滤 venv / 缓存)
              </span>
              <button
                @click="loadFileTree()"
                class="text-[10px] text-zinc-500 hover:text-zinc-300"
                title="刷新"
              >🔄 刷新</button>
            </div>
            <template x-if="!fileTree || fileTree.length === 0">
              <div class="text-xs text-zinc-500 text-center py-4">
                当前工作目录还没有文件
              </div>
            </template>
            <!-- 扁平化树渲染：按 depth 缩进，目录可折叠 -->
            <div x-show="fileTree && fileTree.length" class="text-xs space-y-px">
              <template x-for="node in flatFileTree()" :key="node.path">
                <div class="flex items-center gap-1 hover:bg-white/5 rounded transition"
                     :style="`padding-left: ${4 + node.depth * 14}px`">
                  <!-- 目录：可点击展开/收起 -->
                  <template x-if="node.is_dir">
                    <button
                      @click="toggleDir(node.path)"
                      class="flex items-center gap-1 flex-1 text-left py-0.5 text-zinc-300 hover:text-white"
                      :title="`${node.path} (${node.children?.length || 0} 项)`"
                    >
                      <span class="text-zinc-500 w-3 text-center"
                            x-text="expandedDirs[node.path] ? '▼' : '▶'"></span>
                      <span>📁</span>
                      <span class="truncate" x-text="node.name"></span>
                      <span class="text-[10px] text-zinc-600"
                            x-text="`(${node.children?.length || 0})`"></span>
                    </button>
                  </template>
                  <!-- 文件：点击插入 @path -->
                  <template x-if="!node.is_dir">
                    <button
                      @click="insertFileMention(node.path); workdirCardOpen = false"
                      class="flex items-center gap-1 flex-1 text-left py-0.5 text-zinc-300 hover:text-white"
                      :title="`点击插入 @${node.path}\n大小: ${formatSize(node.size)}`"
                    >
                      <span class="w-3"></span>
                      <span x-text="fileIcon(node.name)"></span>
                      <span class="truncate" x-text="node.name"></span>
                    </button>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>
      </header>

      <!-- 消息区（拖拽监听已移到全局 window 级，避免漏接底部区域） -->
      <div
        class="flex-1 overflow-y-auto px-6 py-6 scrollbar-thin space-y-5"
        x-ref="messagesEl"
      >
        <!-- 拖拽提示 -->
        <div
          x-show="dragHover"
          x-transition.opacity
          class="fixed inset-0 z-40 bg-primary/20 backdrop-blur-sm pointer-events-none
                 flex items-center justify-center"
        >
          <div class="text-2xl font-medium text-white tracking-wider">
            释放以上传到工作目录
          </div>
        </div>

        <!-- 已压缩历史折叠卡（消息列表顶部）：每次压缩 append 一条 entry -->
        <template x-if="currentConv?.compressed_summaries?.length">
          <div class="space-y-2 mb-3">
            <div class="text-[11px] text-zinc-500 px-1">
              📜 <span x-text="currentConv.compressed_summaries.length"></span> 段历史已压缩到记忆库（点击展开看摘要）
            </div>
            <template x-for="(entry, ei) in currentConv.compressed_summaries" :key="ei">
              <div class="border border-amber-500/25 rounded-lg bg-amber-500/5 hover:bg-amber-500/10 transition">
                <button
                  @click="toggleCompressedEntry(ei)"
                  class="w-full px-3 py-2 flex items-center justify-between text-xs text-zinc-300 hover:text-zinc-100"
                >
                  <span class="flex items-center gap-2">
                    <span class="text-amber-300/80" x-text="compressedExpanded[ei] ? '▼' : '▶'"></span>
                    <span>
                      <b class="text-amber-200" x-text="entry.count"></b> 条消息
                      <span class="text-zinc-500 ml-1" x-text="(entry.first_ts||'').slice(0,10) + ' ~ ' + (entry.last_ts||'').slice(0,10)"></span>
                    </span>
                  </span>
                  <span class="text-[10px] text-zinc-500" x-text="(entry.ts||'').slice(0,16).replace('T',' ') + ' 压缩'"></span>
                </button>
                <div
                  x-show="compressedExpanded[ei]"
                  x-transition.opacity.duration.150ms
                  class="px-3 pb-3 text-xs text-zinc-300 whitespace-pre-wrap leading-relaxed border-t border-amber-500/15"
                  x-text="compressedFullText[ei] || entry.summary_preview || '（加载中...）'"
                ></div>
              </div>
            </template>
          </div>
        </template>

        <template x-for="(msg, idx) in messages" :key="idx">
          <div x-show="isVisibleMessage(msg)">
            <!-- ─── 工具步骤卡（role=tool）：紧凑样式，无头像，左侧缩进 ─── -->
            <template x-if="msg.role === 'tool'">
              <div class="ml-11 mb-1 group">
                <!-- 折叠头：图标 + 工具名 + 参数预览 + 状态 + 展开按钮 -->
                <button
                  @click="toggleStep(idx)"
                  class="w-full flex items-center gap-2 px-2.5 py-1.5 rounded-md
                         bg-zinc-800/40 hover:bg-zinc-800/70 border border-white/5
                         hover:border-white/15 transition text-left text-xs"
                >
                  <span class="text-sm shrink-0" x-text="toolIcon((findToolCallForTool(msg) || {}).name)"></span>
                  <code class="text-amber-300/90 shrink-0" x-text="(findToolCallForTool(msg) || {}).name || '(unknown)'"></code>
                  <span class="text-zinc-500 truncate flex-1 font-mono"
                        x-text="toolArgsPreview(findToolCallForTool(msg))"></span>
                  <span class="shrink-0 text-sm"
                        :class="{
                          'text-emerald-400': toolResultStatus(msg) === '✓',
                          'text-red-400': toolResultStatus(msg) === '✗',
                          'text-amber-300': toolResultStatus(msg) === '⚠',
                          'text-zinc-500': toolResultStatus(msg) === '🔄',
                        }"
                        x-text="toolResultStatus(msg)"></span>
                  <span class="shrink-0 text-zinc-500 text-[10px]"
                        x-text="expandedSteps[idx] ? '▼' : '▶'"></span>
                </button>

                <!-- 展开态：完整参数 + 完整结果 -->
                <div x-show="expandedSteps[idx]"
                     x-transition.opacity.duration.150ms
                     class="mt-1 ml-2 pl-3 border-l-2 border-amber-500/20 space-y-2 py-1">
                  <!-- 参数 JSON -->
                  <details open>
                    <summary class="text-[10px] text-zinc-500 cursor-pointer hover:text-zinc-300">
                      参数
                    </summary>
                    <pre class="mt-1 text-[11px] text-zinc-300 bg-black/30 rounded p-2 overflow-x-auto whitespace-pre-wrap"
                         x-text="JSON.stringify((findToolCallForTool(msg) || {}).arguments || {}, null, 2)"></pre>
                  </details>
                  <!-- 结果 -->
                  <details open>
                    <summary class="text-[10px] text-zinc-500 cursor-pointer hover:text-zinc-300">
                      结果
                    </summary>
                    <pre class="mt-1 text-[11px] text-zinc-300 bg-black/30 rounded p-2 overflow-x-auto whitespace-pre-wrap max-h-96 overflow-y-auto"
                         x-text="msg.content || '(空)'"></pre>
                  </details>
                </div>

                <!-- 折叠态结果预览（一行） -->
                <div x-show="!expandedSteps[idx]"
                     class="ml-7 text-[11px] text-zinc-500 truncate"
                     x-text="toolResultPreview(msg)"></div>
              </div>
            </template>

            <!-- ─── 普通消息气泡（user / 有内容的 assistant） ─── -->
            <div
              x-show="msg.role !== 'tool'"
              class="message-row group flex gap-3 items-start"
              :class="msg.role === 'user' ? 'flex-row-reverse' : ''"
            >
            <!-- 头像 -->
            <div
              class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-xs font-medium"
              :class="msg.role === 'user'
                ? 'bg-primary/40 text-white'
                : 'bg-zinc-700/60 text-zinc-200'"
            >
              <img x-show="msg.role === 'assistant'" src="/assets/icon.png" class="w-full h-full object-cover" alt="" />
              <img x-show="msg.role === 'user'" src="/assets/user_icon.png" class="w-full h-full object-cover" alt="" />
            </div>

            <!-- 消息内容：限宽 75%，靠近自己头像那一侧 -->
            <div
              class="min-w-0 space-y-2 max-w-[75%]"
              :class="msg.role === 'user' ? 'items-end' : 'items-start'"
            >
              <!-- 编辑模式（仅 user） -->
              <template x-if="editingIdx === idx">
                <div class="bg-zinc-800/70 rounded-lg p-3 space-y-2">
                  <textarea
                    x-model="editingText"
                    rows="3"
                    class="w-full bg-zinc-900/60 border border-white/10 rounded p-2 text-sm
                           focus:outline-none focus:border-primary-light resize-y"
                    @keydown.ctrl.enter.prevent="saveEdit()"
                    @keydown.escape="cancelEdit()"
                  ></textarea>
                  <div class="flex gap-2 justify-end text-xs">
                    <button @click="cancelEdit()" class="px-3 py-1 text-zinc-400 hover:text-zinc-100">取消</button>
                    <button @click="saveEdit()" class="px-3 py-1 bg-primary hover:bg-primary-light rounded">保存并重生成</button>
                  </div>
                </div>
              </template>

              <!-- 正常模式 -->
              <template x-if="editingIdx !== idx">
                <div>
                  <!-- 用户上传的图片缩略图：
                       · msg.images 是 server 端 image_id 列表（持久化在 conv.json，刷新后从 server 拉）
                       · msg._localImages 是本轮乐观渲染的 base64 dataURL（仅 in-memory） -->
                  <template x-if="msgHasImages(msg)">
                    <div class="flex flex-wrap gap-2 max-w-full"
                         :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                      <template x-for="(src, ii) in msgImageSrcs(msg)" :key="ii">
                        <img
                          :src="src"
                          class="max-w-[240px] max-h-[240px] rounded-lg border border-white/10 object-cover cursor-zoom-in"
                          @click="window.open(src, '_blank')"
                          alt="图片"
                        />
                      </template>
                    </div>
                  </template>

                  <!-- 消息内容（流式时还没字也要占位，避免气泡瞬时无） -->
                  <div
                    x-show="msgText(msg)"
                    class="prose-msg rounded-lg px-4 py-3 inline-block max-w-full"
                    :class="msg.role === 'user'
                      ? 'bg-primary/25 text-zinc-100'
                      : 'bg-zinc-800/60 text-zinc-100'"
                    x-html="renderMarkdown(stripImageRef(msgText(msg)))"
                  ></div>

                  <!-- streaming 状态条：思考中 / 调用工具中 / 生成中 -->
                  <template x-if="msg.streaming && msg.role === 'assistant'">
                    <div class="flex items-center gap-2 mt-1.5 text-xs text-primary-light">
                      <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
                      </svg>
                      <span x-text="streamingHint(msg)"></span>
                    </div>
                  </template>

                  <!-- 生成的文件预览 -->
                  <template x-if="msg.files && msg.files.length">
                    <div class="mt-2 space-y-2">
                      <div class="text-xs text-zinc-400">
                        📎 生成 <span x-text="msg.files.length"></span> 个文件
                      </div>
                      <template x-for="file in msg.files" :key="file">
                        <div class="space-y-1">

                          <!-- 图片：内联显示 -->
                          <template x-if="isImageFile(file)">
                            <div>
                              <a :href="fileUrl(file, true)" target="_blank">
                                <img :src="fileUrl(file)" :alt="file"
                                     class="rounded-lg border border-white/10 max-h-96 max-w-full hover:opacity-90 transition" />
                              </a>
                              <div class="text-xs text-zinc-500 mt-1" x-text="file"></div>
                            </div>
                          </template>

                          <!-- PDF：iframe 浏览器原生预览 -->
                          <template x-if="isPdfFile(file)">
                            <div>
                              <div class="text-xs text-zinc-400 mb-1 flex items-center justify-between">
                                <span>📕 <span x-text="file"></span></span>
                                <a :href="fileUrl(file, true)" target="_blank"
                                   class="hover:text-white">💾 下载</a>
                              </div>
                              <iframe :src="fileUrl(file)"
                                      class="w-full h-96 rounded-lg border border-white/10 bg-white"></iframe>
                            </div>
                          </template>

                          <!-- docx：点击展开文本预览 -->
                          <template x-if="isDocxFile(file)">
                            <div class="space-y-1">
                              <button
                                @click="toggleDocxPreview(file)"
                                class="w-full text-left bg-zinc-800/60 hover:bg-zinc-700/60 border border-white/10
                                       rounded-md px-3 py-1.5 text-xs text-zinc-200 transition
                                       flex items-center justify-between gap-2"
                              >
                                <span>📄 <span x-text="file"></span></span>
                                <span class="text-zinc-400" x-text="docxOpen[file] ? '▲ 收起' : '▼ 预览文本'"></span>
                              </button>
                              <pre
                                x-show="docxOpen[file]"
                                x-text="docxCache[file] || '加载中…'"
                                class="text-xs text-zinc-200 bg-black/40 rounded-md p-3 max-h-80
                                       overflow-y-auto whitespace-pre-wrap font-sans"
                              ></pre>
                              <a :href="fileUrl(file, true)" target="_blank"
                                 class="text-[10px] text-zinc-400 hover:text-white">💾 下载</a>
                            </div>
                          </template>

                          <!-- 其他：仅下载按钮 -->
                          <template x-if="!isImageFile(file) && !isPdfFile(file) && !isDocxFile(file)">
                            <a :href="fileUrl(file, true)" target="_blank"
                               class="inline-flex items-center gap-2 bg-zinc-800/60 hover:bg-zinc-700/60
                                      border border-white/10 rounded-md px-3 py-1.5 text-xs text-zinc-200 transition">
                              💾 <span x-text="file"></span>
                            </a>
                          </template>

                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- 操作按钮（hover 显示） -->
                  <div class="opacity-0 group-hover:opacity-100 flex gap-2 mt-1.5 text-xs text-zinc-400 transition">
                    <button
                      @click="copyToClipboard(msgText(msg))"
                      class="hover:text-zinc-100"
                      title="复制内容"
                    >
                      ⧉ 复制
                    </button>
                    <template x-if="msg.role === 'user' && !streaming">
                      <button @click="startEdit(idx)" class="hover:text-zinc-100">✎ 编辑</button>
                    </template>
                    <template x-if="msg.role === 'assistant' && idx === messages.length - 1 && !streaming">
                      <button @click="regenerate()" class="hover:text-zinc-100">↻ 重新生成</button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
          </div>
        </template>

        <!-- 空消息提示 -->
        <template x-if="messages.length === 0">
          <div class="h-full flex items-center justify-center text-zinc-500 text-sm">
            ……
          </div>
        </template>
      </div>

      <!-- 撞墙提示卡（loop 达到 max_iterations 后显示，点继续触发 resume） -->
      <template x-if="currentConv?.truncated && !streaming">
        <div class="px-6 pb-2">
          <div class="border border-amber-500/40 bg-amber-500/10 rounded-lg p-3 flex items-start gap-3">
            <span class="text-xl shrink-0">⚠️</span>
            <div class="flex-1 min-w-0 text-xs">
              <div class="text-amber-200 font-medium mb-1">本轮工具调用达到上限</div>
              <div class="text-zinc-300 leading-relaxed" x-text="currentConv?.truncated_reason || '已达 max_iterations 上限'"></div>
              <div class="text-zinc-400 mt-1.5 text-[11px]">上面的对话已完整保留。点"继续"让有希接着干（不会重发任何用户消息），或"放弃"清掉提示。</div>
            </div>
            <div class="flex flex-col gap-1 shrink-0">
              <button
                @click="sendMessage({ resume: true })"
                class="px-3 py-1 text-xs bg-amber-500/30 hover:bg-amber-500/50 border border-amber-400/40 rounded text-amber-100 transition"
              >继续 ▶</button>
              <button
                @click="currentConv.truncated = false; currentConv.truncated_reason = '';"
                class="px-3 py-1 text-xs text-zinc-400 hover:text-zinc-100 transition"
              >放弃</button>
            </div>
          </div>
        </div>
      </template>

      <!-- 底部输入区 -->
      <!-- 终端输出面板（D3：run_command_stream 实时流式输出） -->
      <div
        x-show="terminalOpen"
        x-transition.duration.150ms
        class="mx-6 mb-2 rounded-lg border border-zinc-700 bg-zinc-900/95 backdrop-blur-sm overflow-hidden"
      >
        <div class="flex items-center justify-between px-3 py-1.5 border-b border-zinc-700 bg-zinc-800/60">
          <span class="text-xs text-zinc-300 font-mono">
            ⌨ 终端输出
            <span x-show="!terminalDone" class="inline-block w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse ml-1.5"></span>
            <span x-show="terminalDone" class="text-zinc-500 ml-1.5 text-[10px]">（已完成）</span>
          </span>
          <div class="flex items-center gap-2">
            <button
              x-show="!terminalDone && terminalTaskId"
              @click="cancelCommand()"
              class="text-[10px] px-2 py-0.5 rounded bg-red-600 hover:bg-red-500 text-white transition"
            >■ 停止</button>
            <button
              @click="terminalOpen = false"
              class="text-zinc-500 hover:text-zinc-200 transition text-xs"
            >✕</button>
          </div>
        </div>
        <div
          x-ref="terminalBody"
          class="overflow-y-auto max-h-48 px-3 py-2 space-y-0.5 font-mono text-xs leading-relaxed scrollbar-thin"
          style="background: #0a0a0f;"
        >
          <template x-for="(line, i) in terminalLines" :key="i">
            <div
              :class="line.tag === 'stderr' ? 'text-red-400'
                    : line.tag === 'done' ? 'text-zinc-500'
                    : 'text-emerald-300'"
              x-text="line.text"
            ></div>
          </template>
          <div x-show="!terminalDone && terminalLines.length === 0"
               class="text-zinc-600 animate-pulse">等待输出…</div>
        </div>
      </div>

      <!-- 后台任务浮卡（D3：TaskManager） -->
      <div
        x-show="taskCardOpen"
        x-transition.opacity.duration.150ms
        @click.outside="taskCardOpen = false"
        class="absolute right-4 top-14 z-30 w-96 max-h-96 overflow-y-auto scrollbar-thin
               bg-zinc-900/95 border border-white/15 rounded-lg shadow-2xl shadow-black/60
               backdrop-blur-md"
      >
        <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between sticky top-0 bg-zinc-900/95">
          <span class="text-sm font-medium tracking-wider">⚡ 后台任务</span>
          <span class="text-[10px] text-zinc-500" x-text="`${tasks.length} 个任务`"></span>
        </div>
        <template x-if="tasks.length === 0">
          <div class="px-4 py-6 text-center text-xs text-zinc-500">
            没有后台任务<br/>
            <span class="text-[10px]">有希跑长任务时这里会显示</span>
          </div>
        </template>
        <div class="py-1 space-y-0.5">
          <template x-for="t in tasks" :key="t.id">
            <div class="px-3 py-2 hover:bg-white/5 cursor-pointer transition"
                 @click="selectTask(t.id)">
              <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-1.5 min-w-0 flex-1">
                  <span class="shrink-0 w-2 h-2 rounded-full"
                        :class="t.status === 'running' ? 'bg-green-500 animate-pulse'
                              : t.status === 'cancelled' ? 'bg-yellow-500'
                              : t.status === 'failed' ? 'bg-red-500'
                              : 'bg-zinc-500'"></span>
                  <span class="text-xs truncate text-zinc-200" x-text="t.name"></span>
                </div>
                <div class="flex items-center gap-1 shrink-0">
                  <span class="text-[10px] text-zinc-500" x-text="`${t.elapsed}s`"></span>
                  <button x-show="t.status === 'running'"
                          @click.stop="cancelTaskById(t.id)"
                          class="text-[9px] px-1.5 py-0.5 rounded bg-red-600/50 hover:bg-red-500 text-white">■</button>
                  <button x-show="t.status !== 'running'"
                          @click.stop="deleteTask(t.id)"
                          class="text-[9px] px-1.5 py-0.5 rounded bg-zinc-700 hover:bg-zinc-600 text-zinc-400">✕</button>
                </div>
              </div>
              <!-- 展开的详情 -->
              <div x-show="taskDetail?.id === t.id" class="mt-2 space-y-1">
                <div class="text-[10px] text-zinc-500 font-mono" x-text="`${t.cmd} ${(t.args||[]).join(' ')}`"></div>
                <div class="text-[10px] text-zinc-500">
                  状态: <span x-text="t.status"></span>
                  <span x-show="t.exit_code !== null"> · 退出码: <span x-text="t.exit_code"></span></span>
                </div>
                <div x-show="taskDetailLoading" class="text-[10px] text-zinc-500 animate-pulse">加载中…</div>
                <div x-show="!taskDetailLoading && taskDetail?.stdout" class="max-h-32 overflow-y-auto rounded bg-black/40 p-2 font-mono text-[10px] text-emerald-300/90 leading-relaxed scrollbar-thin"
                     x-text="taskDetail.stdout"></div>
                <div x-show="!taskDetailLoading && taskDetail?.stderr" class="max-h-32 overflow-y-auto rounded bg-black/40 p-2 font-mono text-[10px] text-red-400/90 leading-relaxed scrollbar-thin mt-1"
                     x-text="taskDetail.stderr"></div>
              </div>
            </div>
          </template>
        </div>
